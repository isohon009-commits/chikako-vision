<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chikako — Savdo nazorati</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F6F3; --surface:#FFFFFF; --ink:#1A1A1A; --muted:#6B6B6B;
    --red:#E0322B; --green:#1F9D5B; --amber:#E08A1E; --danger:#C0392B;
    --border:#E8E6E1; --shelf:#EFE9E2;
    --display:'Space Grotesk',sans-serif; --body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}

  /* Header */
  header{background:var(--surface);border-bottom:1px solid var(--border);
    padding:18px 24px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:10}
  .brand{display:flex;align-items:baseline;gap:10px}
  .logo{font-family:var(--display);font-weight:700;font-size:22px;color:var(--red);
    letter-spacing:-.5px}
  .tagline{font-size:13px;color:var(--muted);font-weight:500}
  .refresh{font-family:var(--body);font-size:13px;font-weight:500;color:var(--ink);
    background:var(--bg);border:1px solid var(--border);border-radius:8px;
    padding:8px 14px;cursor:pointer;transition:background .15s}
  .refresh:hover{background:#efeee9}

  .wrap{max-width:960px;margin:0 auto;padding:24px}

  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
  .stat .num{font-family:var(--display);font-size:28px;font-weight:600;line-height:1}
  .stat .lbl{font-size:12px;color:var(--muted);margin-top:6px;font-weight:500;
    text-transform:uppercase;letter-spacing:.4px}
  .stat.flag .num{color:var(--amber)}
  .stat.flag{border-color:#F0DcA8;background:#FDF8EE}

  /* Filters */
  .filters{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
  .tab{font-size:14px;font-weight:500;padding:8px 16px;border-radius:20px;
    border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--muted)}
  .tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .tab.flag.active{background:var(--amber);border-color:var(--amber)}

  /* Visit list */
  .visit{background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:16px 18px;margin-bottom:10px}
  .visit.susp{border-left:3px solid var(--amber)}
  .visit-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .who{display:flex;align-items:center;gap:12px;min-width:0}
  .badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;
    white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
  .badge.clean{background:#E6F4EC;color:var(--green)}
  .badge.susp{background:#FBEEDA;color:var(--amber)}
  .who-text{min-width:0}
  .agent{font-weight:600;font-size:15px}
  .store{font-size:13px;color:var(--muted)}
  .meta{display:flex;align-items:center;gap:18px;flex-shrink:0}
  .score{font-family:var(--display);font-size:20px;font-weight:600;text-align:right}
  .score small{font-size:12px;color:var(--muted);font-weight:400}
  .date{font-size:12px;color:var(--muted);text-align:right}

  /* shelf share bar — signature element */
  .shelf{margin-top:12px;display:flex;align-items:center;gap:10px}
  .shelf-track{flex:1;height:8px;background:var(--shelf);border-radius:4px;overflow:hidden}
  .shelf-fill{height:100%;background:var(--red);border-radius:4px}
  .shelf-pct{font-size:12px;font-weight:600;color:var(--muted);width:78px;flex-shrink:0}

  .flags{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
  .flag-item{font-size:13px;color:var(--danger);display:flex;gap:8px;margin-bottom:4px}
  .flag-item::before{content:"!";font-weight:700;color:var(--amber)}
  .summary{font-size:13px;color:var(--muted);margin-top:10px;font-style:italic}

  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .loading{text-align:center;padding:40px;color:var(--muted)}

  @media(max-width:640px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .meta{gap:10px}
    .visit-top{flex-wrap:wrap}
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="logo">Chikako</span>
    <span class="tagline">Savdo nazorati</span>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <a href="/stores-page" style="font-size:13px;text-decoration:none;color:var(--muted);padding:8px 14px;border:1px solid var(--border);border-radius:8px">Do'konlar</a>
    <button class="refresh" onclick="load()">Yangilash</button>
  </div>
</header>

<div class="wrap">
  <div class="stats" id="stats"></div>

  <div id="attendance" style="margin-bottom:24px"></div>

  <div class="filters">
    <button class="tab active" data-f="all" onclick="setFilter('all')">Hammasi</button>
    <button class="tab flag" data-f="susp" onclick="setFilter('susp')">Shubhali</button>
  </div>

  <div id="list"><div class="loading">Yuklanmoqda...</div></div>
</div>

<script>
let filter = "all";

function setFilter(f){
  filter = f;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.f===f));
  load();
}

async function load(){
  try{
    const now = new Date();
    const today = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
    const [stats, visits, attendance] = await Promise.all([
      fetch("/stats").then(r=>r.json()),
      fetch("/visits" + (filter==="susp" ? "?suspicious=true" : "")).then(r=>r.json()),
      fetch("/attendance?date="+today).then(r=>r.json())
    ]);
    renderStats(stats);
    renderAttendance(attendance);
    renderVisits(visits);
  }catch(e){
    document.getElementById("list").innerHTML =
      '<div class="empty">Serverga ulanib bo\'lmadi. Server ishlayaptimi?</div>';
  }
}

function renderAttendance(rows){
  const el = document.getElementById("attendance");
  if(!rows || !rows.length){
    el.innerHTML = '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:13px;color:var(--muted)">Bugun hali hech kim ishni boshlamadi.</div>';
    return;
  }
  el.innerHTML =
    '<div style="font-size:14px;font-weight:600;margin-bottom:10px">Bugungi agentlar</div>' +
    '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden">' +
    rows.map(r=>{
      const sess = (r.sessions||[]).map(s=>
        `${s.start_time||'—'}–${s.end_time||'...'}`).join(", ");
      return `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap">
        <div style="font-weight:600;font-size:14px">${esc(r.agent)}</div>
        <div style="display:flex;gap:16px;font-size:13px;color:var(--muted);align-items:center">
          <span>Seanslar: <b style="color:var(--ink)">${esc(sess)}</b></span>
          <span>Do'konlar: <b style="color:var(--ink)">${r.stores_visited}</b></span>
        </div>
      </div>`;
    }).join("") +
    '</div>';
}

function renderStats(s){
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="num">${s.total}</div><div class="lbl">Jami tashrif</div></div>
    <div class="stat flag"><div class="num">${s.suspicious}</div><div class="lbl">Shubhali</div></div>
    <div class="stat"><div class="num">${s.avg_score}</div><div class="lbl">O'rtacha ball</div></div>
    <div class="stat"><div class="num">${s.agents}</div><div class="lbl">Agentlar</div></div>`;
}

function renderVisits(visits){
  const list = document.getElementById("list");
  if(!visits.length){
    list.innerHTML = '<div class="empty">Bu yerda hali tashrif yo\'q.</div>';
    return;
  }
  list.innerHTML = visits.map(v=>{
    const susp = v.needs_review === 1;
    const share = v.share ?? 0;
    const flagsHtml = (v.flags && v.flags.length)
      ? `<div class="flags">${v.flags.map(f=>`<div class="flag-item">${esc(f)}</div>`).join("")}</div>`
      : "";
    const gpsHtml = (v.photo_lat && v.photo_lng)
      ? `<a href="https://maps.google.com/?q=${v.photo_lat},${v.photo_lng}" target="_blank" style="font-size:12px;color:var(--muted);text-decoration:none;display:inline-block;margin-top:8px">📍 Rasm olingan joyni ko'rish</a>`
      : "";
    return `
    <div class="visit ${susp?'susp':''}">
      <div class="visit-top">
        <div class="who">
          <span class="badge ${susp?'susp':'clean'}">${susp?'Shubhali':'Toza'}</span>
          <div class="who-text">
            <div class="agent">${esc(v.agent||'—')}</div>
            <div class="store">${esc(v.store||'')}</div>
          </div>
        </div>
        <div class="meta">
          <div class="score">${v.score ?? '–'}<small>/10</small></div>
          <div class="date">${esc(v.visit_date||'')}<br>${esc(v.created_at||'')}</div>
        </div>
      </div>
      <div class="shelf">
        <div class="shelf-track"><div class="shelf-fill" style="width:${share}%"></div></div>
        <div class="shelf-pct">Polka ${share}%</div>
      </div>
      ${v.summary ? `<div class="summary">${esc(v.summary)}</div>` : ""}
      ${gpsHtml}
      ${flagsHtml}
    </div>`;
  }).join("");
}

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

load();
</script>
</body>
</html>

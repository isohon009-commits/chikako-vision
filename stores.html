<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chikako — Do'konlar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F7F6F3;--surface:#FFF;--ink:#1A1A1A;--muted:#6B6B6B;--red:#E0322B;
    --green:#1F9D5B;--border:#E8E6E1;--display:'Space Grotesk',sans-serif;--body:'Inter',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:15px}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 24px;
    display:flex;align-items:center;gap:10px}
  .logo{font-family:var(--display);font-weight:700;font-size:22px;color:var(--red)}
  .tagline{font-size:13px;color:var(--muted);font-weight:500}
  .nav{margin-left:auto;display:flex;gap:8px}
  .nav a{font-size:13px;text-decoration:none;color:var(--muted);padding:6px 12px;
    border:1px solid var(--border);border-radius:8px}
  .nav a.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .wrap{max-width:760px;margin:0 auto;padding:24px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
  h2{font-size:16px;font-weight:600;margin-bottom:14px}
  label{font-size:13px;color:var(--muted);font-weight:500;display:block;margin-bottom:5px}
  input{width:100%;border:1px solid var(--border);border-radius:8px;padding:11px;font-size:15px;
    font-family:var(--body);margin-bottom:12px}
  input:focus{outline:none;border-color:var(--red)}
  .row{display:flex;gap:10px}
  .row>div{flex:1}
  .btn{background:var(--red);color:#fff;border:none;border-radius:8px;padding:12px 18px;
    font-size:15px;font-weight:600;font-family:var(--body);cursor:pointer}
  .btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--border);width:100%;margin-bottom:12px}
  .gps-note{font-size:13px;margin-bottom:12px}
  .gps-note.ok{color:var(--green)}
  .store{display:flex;align-items:center;justify-content:space-between;padding:12px 0;
    border-bottom:1px solid var(--border)}
  .store:last-child{border-bottom:none}
  .store .nm{font-weight:600}
  .store .co{font-size:12px;color:var(--muted)}
  .del{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px}
  .empty{color:var(--muted);padding:20px 0;text-align:center}
  a.maplink{font-size:12px;color:var(--muted);text-decoration:none}
</style>
</head>
<body>
<header>
  <span class="logo">Chikako</span><span class="tagline">Do'konlar bazasi</span>
  <div class="nav">
    <a href="/panel">Nazorat</a>
    <a href="/stores-page" class="active">Do'konlar</a>
  </div>
</header>

<div class="wrap">
  <div class="card">
    <h2>Excel'dan ommaviy yuklash</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">
      Smartup'dan olingan Excel faylni yuklang — barcha do'konlar koordinatasi bilan bir marta qo'shiladi.
      <b>Diqqat:</b> bu eski do'konlar ro'yxatini to'liq almashtiradi.</p>
    <input type="file" id="excelInput" accept=".xlsx,.xls" style="margin-bottom:12px">
    <button class="btn" onclick="importExcel()">Excel'dan yuklash</button>
    <div id="importNote" style="font-size:13px;margin-top:12px"></div>
  </div>

  <div class="card">
    <h2>Yangi do'kon qo'shish</h2>
    <label>Do'kon nomi</label>
    <input type="text" id="name" placeholder="Qo'qon-12">
    <button class="btn-ghost btn" style="color:var(--ink)" onclick="useGPS()">📍 Hozirgi joylashuvni olish</button>
    <div class="gps-note" id="gpsNote"></div>
    <div class="row">
      <div><label>Kenglik (lat)</label><input type="text" id="lat" placeholder="40.5283"></div>
      <div><label>Uzunlik (lng)</label><input type="text" id="lng" placeholder="70.9425"></div>
    </div>
    <button class="btn" onclick="saveStore()">Saqlash</button>
  </div>

  <div class="card">
    <h2>Do'konlar ro'yxati</h2>
    <div id="list"><div class="empty">Yuklanmoqda...</div></div>
  </div>
</div>

<script>
async function importExcel(){
  const f = document.getElementById("excelInput").files[0];
  if(!f){ alert("Excel faylni tanlang"); return; }
  const note = document.getElementById("importNote");
  note.textContent = "Yuklanmoqda... (1000+ do'kon bo'lsa biroz kutadi)";
  note.style.color = "var(--muted)";
  const fd = new FormData(); fd.append("file", f);
  try{
    const res = await fetch("/stores/import", {method:"POST", body:fd});
    if(!res.ok){
      let msg = "Xato ("+res.status+")";
      try{ const e=await res.json(); if(e.detail) msg=e.detail; }catch(_){}
      note.textContent = "Xatolik: " + msg; note.style.color = "var(--red)"; return;
    }
    const d = await res.json();
    note.textContent = "✓ "+d.imported+" ta do'kon yuklandi" + (d.skipped? (", "+d.skipped+" tasi o'tkazib yuborildi (koordinatasiz)") : "");
    note.style.color = "var(--green)";
    load();
  }catch(e){ note.textContent = "Xatolik: yuborib bo'lmadi"; note.style.color = "var(--red)"; }
}

async function load(){
  const stores = await fetch("/stores").then(r=>r.json());
  const el = document.getElementById("list");
  if(!stores.length){ el.innerHTML='<div class="empty">Hali do\'kon yo\'q. Yuqorida qo\'shing.</div>'; return; }
  el.innerHTML = stores.map(s=>`
    <div class="store">
      <div>
        <div class="nm">${esc(s.name)}</div>
        <div class="co">${s.lat?.toFixed(5)}, ${s.lng?.toFixed(5)}
          &nbsp;<a class="maplink" href="https://maps.google.com/?q=${s.lat},${s.lng}" target="_blank">xaritada</a></div>
      </div>
      <button class="del" onclick="delStore(${s.id})">O'chirish</button>
    </div>`).join("");
}

function useGPS(){
  const note = document.getElementById("gpsNote");
  note.textContent = "GPS aniqlanmoqda...";
  note.className = "gps-note";
  navigator.geolocation.getCurrentPosition(
    pos=>{
      document.getElementById("lat").value = pos.coords.latitude.toFixed(6);
      document.getElementById("lng").value = pos.coords.longitude.toFixed(6);
      note.textContent = "📍 Joylashuv olindi (do'kon oldida turib bosing)";
      note.className = "gps-note ok";
    },
    err=>{ note.textContent = "GPS ruxsati berilmadi"; note.className="gps-note"; },
    {enableHighAccuracy:true, timeout:10000}
  );
}

async function saveStore(){
  const name = document.getElementById("name").value.trim();
  const lat = document.getElementById("lat").value.trim();
  const lng = document.getElementById("lng").value.trim();
  if(!name || !lat || !lng){ alert("Nom va koordinatalarni to'ldiring"); return; }
  const fd = new FormData();
  fd.append("name",name); fd.append("lat",lat); fd.append("lng",lng);
  await fetch("/stores",{method:"POST",body:fd});
  document.getElementById("name").value="";
  document.getElementById("lat").value="";
  document.getElementById("lng").value="";
  document.getElementById("gpsNote").textContent="";
  load();
}

async function delStore(id){
  if(!confirm("Bu do'konni o'chirasizmi?")) return;
  await fetch("/stores/"+id,{method:"DELETE"});
  load();
}

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
load();
</script>
</body>
</html>

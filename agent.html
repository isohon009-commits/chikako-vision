<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chikako — Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F7F6F3;--surface:#FFF;--ink:#1A1A1A;--muted:#6B6B6B;--red:#E0322B;
    --green:#1F9D5B;--amber:#E08A1E;--danger:#C0392B;--border:#E8E6E1;
    --display:'Space Grotesk',sans-serif;--body:'Inter',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);min-height:100vh;display:flex;flex-direction:column}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px;text-align:center}
  .logo{font-family:var(--display);font-weight:700;font-size:20px;color:var(--red)}
  .logo small{font-family:var(--body);font-weight:500;font-size:13px;color:var(--muted);display:block;margin-top:2px}
  .screen{flex:1;padding:20px 16px;display:none;flex-direction:column}
  .screen.active{display:flex}
  label{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:6px;display:block}
  input,select{width:100%;border:1px solid var(--border);border-radius:10px;padding:13px;
    font-size:16px;font-family:var(--body);margin-bottom:12px;background:var(--surface)}
  input:focus,select:focus{outline:none;border-color:var(--red)}
  .btn{background:var(--red);color:#fff;border:none;border-radius:10px;padding:15px;
    font-size:16px;font-weight:600;font-family:var(--body);width:100%;cursor:pointer}
  .btn:active{opacity:.85}
  .btn:disabled{background:#ccc}
  .btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--border)}
  .btn-green{background:var(--green)}
  .btn-sm{padding:9px 12px;font-size:13px;width:auto;border-radius:8px}
  .title{font-size:18px;font-weight:600;margin-bottom:6px}
  .who{font-size:13px;color:var(--muted);margin-bottom:16px}
  .toprow{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .worknote{font-size:13px;background:#E6F4EC;color:var(--green);padding:10px 12px;border-radius:10px;margin-bottom:16px;text-align:center}
  .store-results{border:1px solid var(--border);border-radius:10px;max-height:240px;overflow-y:auto;margin-bottom:14px;background:var(--surface)}
  .store-item{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;font-size:15px}
  .store-item:last-child{border-bottom:none}
  .store-item:active{background:var(--bg)}
  .store-item .dist{font-size:12px;color:var(--muted);margin-left:6px}
  .selected-store{background:#E6F4EC;border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
  .selected-store .nm{font-weight:600;font-size:15px}
  .photo-box{border:2px dashed var(--border);border-radius:14px;padding:36px 16px;text-align:center;margin-bottom:14px;cursor:pointer;background:var(--surface)}
  .photo-box.locked{opacity:.5;cursor:not-allowed}
  .photo-box .ic{font-size:40px;color:var(--red)}
  .photo-box .tx{font-size:14px;color:var(--muted);margin-top:8px}
  .photo-box img{max-width:100%;border-radius:10px;display:block}
  #fileInput{display:none}
  .geo{font-size:13px;display:flex;align-items:center;gap:6px;margin-bottom:16px;padding:10px 12px;border-radius:10px}
  .geo.ok{color:var(--green);background:#E6F4EC}
  .geo.bad{color:var(--danger);background:#FCEBEB}
  .geo.wait{color:var(--amber);background:#FBEEDA}
  .result-ic{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:40px}
  .result-ic.ok{background:#E6F4EC;color:var(--green)}
  .result-ic.warn{background:#FBEEDA;color:var(--amber)}
  .center{text-align:center}
  .score-badge{display:inline-block;background:#E6F4EC;color:var(--green);padding:6px 16px;border-radius:10px;font-size:14px;font-weight:600;margin-top:8px}
  .flags{text-align:left;margin-top:16px}
  .flag{font-size:13px;color:var(--danger);margin-bottom:6px}
  .spacer{flex:1}
  .loading{text-align:center;color:var(--muted);padding:30px;font-size:15px}
  .endbtn{margin-top:14px}
  .link{color:var(--red);font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;background:none;border:none}
  .visit-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .visit-item .nm{font-weight:600;font-size:14px}
  .visit-item .tm{font-size:12px;color:var(--muted)}
  .badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px}
  .badge.clean{background:#E6F4EC;color:var(--green)}
  .badge.susp{background:#FBEEDA;color:var(--amber)}
</style>
</head>
<body>
<header><div class="logo">Chikako<small>Agent ilovasi</small></div></header>

<!-- 1. KIRISH -->
<div class="screen active" id="loginScreen">
  <div class="title">Kirish</div>
  <label>Ism familiya</label>
  <input type="text" id="agentName" placeholder="Aziz Karimov">
  <label>Telefon</label>
  <input type="tel" id="agentPhone" placeholder="+998 90 123 45 67">
  <div class="spacer"></div>
  <button class="btn" onclick="login()">Kirish</button>
</div>

<!-- 2. TASHRIF -->
<div class="screen" id="visitScreen">
  <div class="toprow">
    <div><div class="title">Yangi tashrif</div><div class="who" id="whoText"></div></div>
    <button class="link" onclick="openMyVisits()">Bugungi tashriflarim</button>
  </div>

  <button class="btn btn-green" id="startBtn" onclick="startWork()">Ishni boshlash</button>
  <div class="worknote" id="workNote" style="display:none"></div>

  <div id="visitForm" style="display:none">
    <!-- do'kon tanlanmagan -->
    <div id="storePick">
      <label>Do'kon (nom yozib qidiring)</label>
      <input type="text" id="storeSearch" placeholder="Do'kon nomini yozing..." oninput="filterStores()">
      <button class="btn btn-ghost btn-sm" style="width:100%;margin-bottom:12px" onclick="showNearest()">📍 Eng yaqin do'konlar</button>
      <div class="store-results" id="storeResults" style="display:none"></div>
    </div>
    <!-- do'kon tanlangan -->
    <div class="selected-store" id="selectedStore" style="display:none">
      <div class="nm" id="selectedName"></div>
      <button class="link" onclick="changeStore()">O'zgartirish</button>
    </div>

    <div class="geo wait" id="geoStatus" style="display:none">📍 GPS aniqlanmoqda...</div>

    <label id="photoLabel" style="display:none">Polka rasmi</label>
    <div class="photo-box locked" id="photoBox" onclick="tryPhoto()" style="display:none">
      <div class="ic">&#128247;</div><div class="tx">Avval do'konga boring</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="photoPicked(event)">

    <button class="btn" id="submitBtn" onclick="submitVisit()" disabled style="display:none">Yuborish</button>
    <button class="btn btn-ghost endbtn" onclick="endWork()">Ishni tugatish</button>
  </div>
</div>

<!-- 3. NATIJA -->
<div class="screen" id="resultScreen">
  <div id="resultContent"></div>
  <div class="spacer"></div>
  <button class="btn" onclick="newVisit()">Yangi tashrif</button>
</div>

<!-- 4. BUGUNGI TASHRIFLARIM -->
<div class="screen" id="myVisitsScreen">
  <div class="toprow">
    <div class="title">Bugungi tashriflarim</div>
    <button class="link" onclick="showScreen('visitScreen')">← Orqaga</button>
  </div>
  <div id="myVisitsList" style="margin-top:10px"></div>
</div>

<!-- YUKLANMOQDA -->
<div class="screen" id="loadingScreen">
  <div class="loading"><div style="font-size:40px;margin-bottom:12px">&#9203;</div>Yuborilmoqda va tekshirilmoqda...</div>
</div>

<script>
const RADIUS = 150;
let agent = {name:"", phone:""};
let photoFile = null;
let gps = {lat:null, lng:null};
let stores = [];
let selectedStore = null;
let inGeofence = false;

function today(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

const saved = localStorage.getItem("chikako_agent");
if(saved){ agent = JSON.parse(saved); goVisit(); }

function login(){
  const name = document.getElementById("agentName").value.trim();
  const phone = document.getElementById("agentPhone").value.trim();
  if(!name){ alert("Ismingizni kiriting"); return; }
  agent = {name, phone};
  localStorage.setItem("chikako_agent", JSON.stringify(agent));
  goVisit();
}

async function goVisit(){
  document.getElementById("whoText").textContent = agent.name + " · " + (agent.phone||"");
  showScreen("visitScreen");
  const ws = localStorage.getItem("chikako_workdate");
  if(ws === today()){ showWorkStarted(localStorage.getItem("chikako_starttime")||""); }
  await loadStores();
  getGPS();
}

async function loadStores(){
  try{ stores = await fetch("/stores").then(r=>r.json()); }catch(e){ stores = []; }
}

async function startWork(){
  const fd = new FormData(); fd.append("agent",agent.name); fd.append("date",today());
  try{
    const r = await fetch("/attendance/start",{method:"POST",body:fd}).then(r=>r.json());
    localStorage.setItem("chikako_workdate",today());
    localStorage.setItem("chikako_starttime",r.start_time);
    showWorkStarted(r.start_time);
  }catch(e){ alert("Xato, qayta urinib ko'ring"); }
}

function showWorkStarted(time){
  document.getElementById("startBtn").style.display = "none";
  const n = document.getElementById("workNote");
  n.style.display = "block"; n.textContent = "Ish boshlandi: " + time;
  document.getElementById("visitForm").style.display = "block";
}

async function endWork(){
  if(!confirm("Ishni tugatasizmi?")) return;
  const fd = new FormData(); fd.append("agent",agent.name); fd.append("date",today());
  try{
    const r = await fetch("/attendance/end",{method:"POST",body:fd}).then(r=>r.json());
    localStorage.removeItem("chikako_workdate");
    alert("Ish tugatildi: " + r.end_time);
    document.getElementById("startBtn").style.display = "block";
    document.getElementById("workNote").style.display = "none";
    document.getElementById("visitForm").style.display = "none";
  }catch(e){ alert("Xato, qayta urinib ko'ring"); }
}

function getGPS(){
  if(!navigator.geolocation){ return; }
  navigator.geolocation.watchPosition(
    pos => { gps.lat=pos.coords.latitude; gps.lng=pos.coords.longitude; checkGeofence(); },
    err => { setGeo("bad","GPS ruxsati berilmadi"); },
    {enableHighAccuracy:true, timeout:15000, maximumAge:5000}
  );
}

function distance(lat1,lng1,lat2,lng2){
  const R=6371000, p1=lat1*Math.PI/180, p2=lat2*Math.PI/180;
  const dphi=(lat2-lat1)*Math.PI/180, dlam=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dphi/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dlam/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function filterStores(){
  const q = document.getElementById("storeSearch").value.trim().toLowerCase();
  const box = document.getElementById("storeResults");
  if(!q){ box.style.display="none"; return; }
  const matches = stores.filter(s=>s.name.toLowerCase().includes(q)).slice(0,30);
  renderStoreList(matches, false);
}

function showNearest(){
  const box = document.getElementById("storeResults");
  if(!gps.lat){ alert("GPS hali aniqlanmadi, biroz kuting"); return; }
  const withD = stores.map(s=>({...s, d: distance(gps.lat,gps.lng,s.lat,s.lng)}))
    .sort((a,b)=>a.d-b.d).slice(0,15);
  renderStoreList(withD, true);
}

function renderStoreList(list, showDist){
  const box = document.getElementById("storeResults");
  if(!list.length){ box.innerHTML='<div class="store-item">Topilmadi</div>'; box.style.display="block"; return; }
  box.innerHTML = list.map(s=>
    `<div class="store-item" onclick="pickStore(${s.id})">${esc(s.name)}`+
    (showDist ? `<span class="dist">${Math.round(s.d)} m</span>` : '')+`</div>`).join("");
  box.style.display = "block";
}

function pickStore(id){
  selectedStore = stores.find(s=>s.id===id);
  document.getElementById("storePick").style.display = "none";
  document.getElementById("storeResults").style.display = "none";
  document.getElementById("selectedStore").style.display = "flex";
  document.getElementById("selectedName").textContent = selectedStore.name;
  document.getElementById("geoStatus").style.display = "flex";
  document.getElementById("photoLabel").style.display = "block";
  document.getElementById("photoBox").style.display = "block";
  document.getElementById("submitBtn").style.display = "block";
  checkGeofence();
}

function changeStore(){
  selectedStore = null;
  document.getElementById("storePick").style.display = "block";
  document.getElementById("selectedStore").style.display = "none";
  document.getElementById("geoStatus").style.display = "none";
  document.getElementById("photoLabel").style.display = "none";
  document.getElementById("photoBox").style.display = "none";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("storeSearch").value = "";
}

function checkGeofence(){
  if(!selectedStore) return;
  const box = document.getElementById("photoBox");
  if(!gps.lat){ setGeo("wait","📍 GPS aniqlanmoqda..."); inGeofence=false; lockPhoto(); return; }
  const d = Math.round(distance(gps.lat,gps.lng,selectedStore.lat,selectedStore.lng));
  if(d <= RADIUS){
    inGeofence = true;
    setGeo("ok","✓ Do'kondasiz ("+d+" m) — rasm olishingiz mumkin");
    box.classList.remove("locked");
    if(!photoFile) box.querySelector(".tx").textContent = "Rasm olish uchun bosing";
  } else {
    inGeofence = false;
    setGeo("bad","✗ Do'kondan "+d+" m uzoqda — yaqinroq boring");
    lockPhoto();
  }
}

function lockPhoto(){
  const box = document.getElementById("photoBox");
  box.classList.add("locked");
  if(!photoFile) box.querySelector(".tx").textContent = "Avval do'konga boring";
}
function setGeo(cls,txt){ const el=document.getElementById("geoStatus"); el.className="geo "+cls; el.style.display="flex"; el.textContent=txt; }

function tryPhoto(){
  if(!inGeofence){ alert("Rasm olish uchun do'kon joyiga boring"); return; }
  document.getElementById("fileInput").click();
}

function photoPicked(e){
  const file = e.target.files[0];
  if(!file) return;
  photoFile = file;
  const reader = new FileReader();
  reader.onload = ev => { document.getElementById("photoBox").innerHTML = '<img src="'+ev.target.result+'" alt="polka">'; };
  reader.readAsDataURL(file);
  document.getElementById("submitBtn").disabled = false;
}

async function submitVisit(){
  if(!selectedStore){ alert("Do'konni tanlang"); return; }
  if(!photoFile){ alert("Rasm oling"); return; }
  showScreen("loadingScreen");
  const fd = new FormData();
  fd.append("file", photoFile);
  fd.append("photo_lat", gps.lat); fd.append("photo_lng", gps.lng);
  fd.append("store_lat", selectedStore.lat); fd.append("store_lng", selectedStore.lng);
  fd.append("agent", agent.name); fd.append("store", selectedStore.name);
  fd.append("date", today());
  try{
    const res = await fetch("/verify", {method:"POST", body:fd});
    if(!res.ok){
      let msg = "Server xatosi ("+res.status+")";
      try{ const e=await res.json(); if(e.detail) msg=e.detail; }catch(_){}
      showResult({error:true, message:msg}); return;
    }
    showResult(await res.json());
  }catch(err){ showResult({error:true}); }
}

function showResult(data){
  const el = document.getElementById("resultContent");
  if(data.error){
    el.innerHTML = '<div class="result-ic warn">&#10005;</div><div class="center"><div class="title">Xatolik</div>'+
      '<div class="who">'+(data.message||"Yuborib bo\'lmadi. Internetni tekshiring.")+'</div></div>';
  } else {
    const v = data.vision || {};
    const susp = data.needs_human_review;
    const flagsHtml = (data.flags && data.flags.length)
      ? '<div class="flags">'+data.flags.map(f=>'<div class="flag">&#9888; '+f+'</div>').join('')+'</div>' : '';
    el.innerHTML = '<div class="result-ic '+(susp?'warn':'ok')+'">'+(susp?'&#9888;':'&#10003;')+'</div>'+
      '<div class="center"><div class="title">Yuborildi</div>'+
      '<div class="who">Tashrif serverga jo\'natildi va tekshirildi</div>'+
      (v.overall_score!=null ? '<div class="score-badge">Sifat: '+v.overall_score+'/10</div>' : '')+'</div>'+flagsHtml;
  }
  showScreen("resultScreen");
}

function newVisit(){
  photoFile = null;
  selectedStore = null;
  const box = document.getElementById("photoBox");
  box.innerHTML = '<div class="ic">&#128247;</div><div class="tx">Avval do\'konga boring</div>';
  box.classList.add("locked");
  document.getElementById("fileInput").value = "";
  document.getElementById("submitBtn").disabled = true;
  changeStore();
  showScreen("visitScreen");
}

async function openMyVisits(){
  showScreen("myVisitsScreen");
  const el = document.getElementById("myVisitsList");
  el.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px">Yuklanmoqda...</div>';
  try{
    const rows = await fetch("/my-visits?agent="+encodeURIComponent(agent.name)+"&date="+today()).then(r=>r.json());
    if(!rows.length){ el.innerHTML='<div style="color:var(--muted);text-align:center;padding:20px">Bugun hali tashrif yo\'q.</div>'; return; }
    el.innerHTML = '<div style="font-size:13px;color:var(--muted);margin-bottom:10px">Bugun '+rows.length+' ta tashrif</div>' +
      rows.map(r=>`
      <div class="visit-item">
        <div><div class="nm">${esc(r.store)}</div><div class="tm">${esc(r.created_at||'')}</div></div>
        <span class="badge ${r.needs_review?'susp':'clean'}">${r.needs_review?'Shubhali':(r.score!=null?r.score+'/10':'Toza')}</span>
      </div>`).join("");
  }catch(e){ el.innerHTML='<div style="color:var(--danger);text-align:center;padding:20px">Yuklab bo\'lmadi</div>'; }
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
</script>
</body>
</html>

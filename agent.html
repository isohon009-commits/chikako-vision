<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chikako — Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F6F3; --surface:#FFFFFF; --ink:#1A1A1A; --muted:#6B6B6B;
    --red:#E0322B; --green:#1F9D5B; --amber:#E08A1E; --danger:#C0392B;
    --border:#E8E6E1;
    --display:'Space Grotesk',sans-serif; --body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);
    min-height:100vh;display:flex;flex-direction:column}
  header{background:var(--surface);border-bottom:1px solid var(--border);
    padding:16px;text-align:center}
  .logo{font-family:var(--display);font-weight:700;font-size:20px;color:var(--red)}
  .logo small{font-family:var(--body);font-weight:500;font-size:13px;color:var(--muted);display:block;margin-top:2px}
  .screen{flex:1;padding:20px 16px;display:none;flex-direction:column}
  .screen.active{display:flex}

  label{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:6px;display:block}
  input[type=text],input[type=tel]{width:100%;border:1px solid var(--border);border-radius:10px;
    padding:13px;font-size:16px;font-family:var(--body);margin-bottom:16px;background:var(--surface)}
  input:focus{outline:none;border-color:var(--red)}

  .btn{background:var(--red);color:#fff;border:none;border-radius:10px;padding:15px;
    font-size:16px;font-weight:600;font-family:var(--body);width:100%;cursor:pointer}
  .btn:active{opacity:.85}
  .btn:disabled{background:#ccc}
  .btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--border)}

  .title{font-size:18px;font-weight:600;margin-bottom:16px}
  .who{font-size:13px;color:var(--muted);margin-bottom:20px}

  .photo-box{border:2px dashed var(--border);border-radius:14px;padding:36px 16px;
    text-align:center;margin-bottom:14px;cursor:pointer;background:var(--surface)}
  .photo-box .ic{font-size:40px;color:var(--red)}
  .photo-box .tx{font-size:14px;color:var(--muted);margin-top:8px}
  .photo-box img{max-width:100%;border-radius:10px;display:block}
  #fileInput{display:none}

  .gps{font-size:13px;display:flex;align-items:center;gap:6px;margin-bottom:20px}
  .gps.ok{color:var(--green)}
  .gps.wait{color:var(--amber)}
  .gps.err{color:var(--danger)}

  .result-ic{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;margin:0 auto 18px;font-size:40px}
  .result-ic.ok{background:#E6F4EC;color:var(--green)}
  .result-ic.warn{background:#FBEEDA;color:var(--amber)}
  .center{text-align:center}
  .score-badge{display:inline-block;background:#E6F4EC;color:var(--green);
    padding:6px 16px;border-radius:10px;font-size:14px;font-weight:600;margin-top:8px}
  .flags{text-align:left;margin-top:16px}
  .flag{font-size:13px;color:var(--danger);margin-bottom:6px}
  .spacer{flex:1}
  .loading{text-align:center;color:var(--muted);padding:30px;font-size:15px}
</style>
</head>
<body>

<header>
  <div class="logo">Chikako<small>Agent ilovasi</small></div>
</header>

<!-- 1. KIRISH -->
<div class="screen active" id="loginScreen">
  <div class="title">Kirish</div>
  <label>Ism familiya</label>
  <input type="text" id="agentName" placeholder="Aziz Karimov">
  <label>Telefon</label>
  <input type="tel" id="agentPhone" placeholder="+998 90 123 45 67">
  <div class="spacer"></div>
  <button class="btn" onclick="login()">Kirish</button>
</div>

<!-- 2. TASHRIF -->
<div class="screen" id="visitScreen">
  <div class="title">Yangi tashrif</div>
  <div class="who" id="whoText"></div>
  <label>Do'kon nomi</label>
  <input type="text" id="storeName" placeholder="Qo'qon-12">

  <label>Polka rasmi</label>
  <div class="photo-box" id="photoBox" onclick="document.getElementById('fileInput').click()">
    <div class="ic">&#128247;</div>
    <div class="tx">Rasm olish uchun bosing</div>
  </div>
  <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="photoPicked(event)">

  <div class="gps wait" id="gpsStatus">&#128205; GPS aniqlanmoqda...</div>

  <div class="spacer"></div>
  <button class="btn" id="submitBtn" onclick="submitVisit()" disabled>Yuborish</button>
</div>

<!-- 3. NATIJA -->
<div class="screen" id="resultScreen">
  <div id="resultContent"></div>
  <div class="spacer"></div>
  <button class="btn" onclick="newVisit()">Yangi tashrif</button>
</div>

<!-- YUKLANMOQDA -->
<div class="screen" id="loadingScreen">
  <div class="loading">
    <div style="font-size:40px;margin-bottom:12px">&#9203;</div>
    Yuborilmoqda va tekshirilmoqda...
  </div>
</div>

<script>
let agent = {name:"", phone:""};
let photoFile = null;
let gps = {lat:null, lng:null};

// Saqlangan agentni tekshirish
const saved = localStorage.getItem("chikako_agent");
if(saved){
  agent = JSON.parse(saved);
  goVisit();
}

function login(){
  const name = document.getElementById("agentName").value.trim();
  const phone = document.getElementById("agentPhone").value.trim();
  if(!name){ alert("Ismingizni kiriting"); return; }
  agent = {name, phone};
  localStorage.setItem("chikako_agent", JSON.stringify(agent));
  goVisit();
}

function goVisit(){
  document.getElementById("whoText").textContent = agent.name + " · " + (agent.phone||"");
  showScreen("visitScreen");
  getGPS();
}

function getGPS(){
  const el = document.getElementById("gpsStatus");
  el.className = "gps wait";
  el.innerHTML = "&#128205; GPS aniqlanmoqda...";
  if(!navigator.geolocation){
    el.className = "gps err";
    el.innerHTML = "&#128205; GPS qo'llab-quvvatlanmaydi";
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      gps.lat = pos.coords.latitude;
      gps.lng = pos.coords.longitude;
      el.className = "gps ok";
      el.innerHTML = "&#128205; GPS biriktirildi";
      checkReady();
    },
    err => {
      el.className = "gps err";
      el.innerHTML = "&#128205; GPS ruxsati berilmadi (qayta urinish uchun bosing)";
      el.onclick = getGPS;
    },
    {enableHighAccuracy:true, timeout:10000}
  );
}

function photoPicked(e){
  const file = e.target.files[0];
  if(!file) return;
  photoFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById("photoBox").innerHTML =
      '<img src="'+ev.target.result+'" alt="polka">';
  };
  reader.readAsDataURL(file);
  checkReady();
}

function checkReady(){
  document.getElementById("submitBtn").disabled = !(photoFile && gps.lat);
}

async function submitVisit(){
  const store = document.getElementById("storeName").value.trim();
  if(!store){ alert("Do'kon nomini kiriting"); return; }
  if(!photoFile){ alert("Rasm oling"); return; }

  showScreen("loadingScreen");

  const fd = new FormData();
  fd.append("file", photoFile);
  fd.append("photo_lat", gps.lat);
  fd.append("photo_lng", gps.lng);
  fd.append("agent", agent.name);
  fd.append("store", store);
  fd.append("date", new Date().toISOString().slice(0,10));

  try{
    const res = await fetch("/verify", {method:"POST", body:fd});
    const data = await res.json();
    showResult(data);
  }catch(err){
    showResult({error:true});
  }
}

function showResult(data){
  const el = document.getElementById("resultContent");
  if(data.error){
    el.innerHTML = '<div class="result-ic warn">&#10005;</div>'+
      '<div class="center"><div class="title">Xatolik</div>'+
      '<div class="who">Yuborib bo\'lmadi. Internetni tekshirib qayta urinib ko\'ring.</div></div>';
  } else {
    const v = data.vision || {};
    const susp = data.needs_human_review;
    const flagsHtml = (data.flags && data.flags.length)
      ? '<div class="flags">'+data.flags.map(f=>'<div class="flag">&#9888; '+f+'</div>').join('')+'</div>'
      : '';
    el.innerHTML =
      '<div class="result-ic '+(susp?'warn':'ok')+'">'+(susp?'&#9888;':'&#10003;')+'</div>'+
      '<div class="center">'+
        '<div class="title">Yuborildi</div>'+
        '<div class="who">Tashrif serverga jo\'natildi va tekshirildi</div>'+
        (v.overall_score!=null ? '<div class="score-badge">Sifat: '+v.overall_score+'/10</div>' : '')+
      '</div>'+ flagsHtml;
  }
  showScreen("resultScreen");
}

function newVisit(){
  photoFile = null;
  document.getElementById("storeName").value = "";
  document.getElementById("photoBox").innerHTML =
    '<div class="ic">&#128247;</div><div class="tx">Rasm olish uchun bosing</div>';
  document.getElementById("fileInput").value = "";
  document.getElementById("submitBtn").disabled = true;
  goVisit();
}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>
</body>
</html>
